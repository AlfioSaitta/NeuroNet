<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroNet — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0a0d14;
            --glass-bg: rgba(15, 22, 38, 0.72);
            --glass-border: rgba(0, 230, 184, 0.12);
            --primary: #00e6b8;
            --primary-glow: rgba(0, 230, 184, 0.08);
            --danger: #ff3366;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --card-radius: 16px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-base);
            color: var(--text-main);
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image:
                radial-gradient(circle at 30% 20%, rgba(245, 158, 11, 0.08), transparent 35%),
                radial-gradient(circle at 70% 80%, rgba(0, 230, 184, 0.06), transparent 35%);
        }
        .login-container {
            width: 380px;
            max-width: 92vw;
        }
        .login-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--card-radius);
            padding: 40px 32px;
            backdrop-filter: blur(20px);
        }
        .login-logo {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .login-logo span { color: var(--primary); }
        .login-subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.3);
            color: var(--text-main);
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: var(--primary);
            color: #0a0d14;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }
        .login-btn:hover { opacity: 0.9; }
        .login-btn:active { transform: scale(0.98); }
        .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .error-msg {
            color: var(--danger);
            font-size: 0.85rem;
            text-align: center;
            margin-top: 16px;
            min-height: 1.5em;
        }
        .spinner {
            display: inline-block;
            width: 16px; height: 16px;
            border: 2px solid rgba(10,13,20,0.3);
            border-top-color: #0a0d14;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .login-footer {
            text-align: center;
            margin-top: 16px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">✦ <span>NEURONET</span></div>
            <div class="login-subtitle">Cognitive Control Panel</div>
            <form id="login-form" autocomplete="off">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="login-btn" id="login-btn">Sign In</button>
                <div class="error-msg" id="error-msg"></div>
            </form>
        </div>
        <div class="login-footer">NeuroNet AI Ecosystem</div>
    </div>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const err = document.getElementById('error-msg');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            if (!username || !password) { err.textContent = 'Please enter username and password.'; return; }
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Signing in...';
            err.textContent = '';
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });
                if (res.ok) {
                    window.location.href = '/admin/';
                } else {
                    const data = await res.json().catch(() => ({}));
                    err.textContent = data.detail || 'Invalid credentials.';
                }
            } catch (e) {
                err.textContent = 'Connection error. Is the server running?';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });
        // Focus username on load
        document.getElementById('username').focus();
    </script>
</body>
</html>
