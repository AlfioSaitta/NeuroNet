# =====================================================================
# ECOSISTEMA AI LOCALE - SOLO SERVIZI (nessun Jarvis)
# =====================================================================
# Qdrant, SearXNG, Crawl4AI in Docker. Jarvis eseguito direttamente sull'host.
# 
# Avvio: docker compose -f docker-compose.services.yml up -d
#
# Configurazione .env per esecuzione host:
#   QDRANT_HOST=localhost
#   SEARXNG_HOST=http://localhost:8081
#   CRAWL4AI_HOST=http://localhost:11235
#   DATA_DIR=./data/jarvis_mem0
#   DOCUMENTS_DIR=./data/documents
#   MODELS_DIR=./models
#   HOST_FS_PREFIX=

networks:
  ai_network:
    driver: bridge
    name: ai_network

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_db
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    environment:
      - RUST_LOG=warn
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - ai_network

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - ./data/searxng:/etc/searxng
    networks:
      - ai_network

  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: crawl4ai_server
    restart: unless-stopped
    ports:
      - "11235:11235"
    environment:
      - MAX_CONCURRENT_TASKS=3
    networks:
      - ai_network
